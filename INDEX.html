/* ============================================================
   RULES ENGINE — availability & double-booking guard
   ============================================================ */
const RULES = {
  // Parse "Today, 15:00" / "+1d 15:00" / "22 Jun · 18:00" into a coarse day index.
  // Coarse but deterministic — enough to detect overlapping reservations.
  toDay(s){
    if(!s) return 0;
    s = String(s);
    if(/today/i.test(s)) return 0;
    const plus = s.match(/\+(\d+)d/i); if(plus) return +plus[1];
    const md = s.match(/(\d{1,2})\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i);
    if(md) return +md[1]; // day-of-month proxy
    return 0;
  },
  overlap(a1,a2,b1,b2){ return a1 < b2 && b1 < a2; },
  canBookUnit({unit, ci, nights}){
    const u = STATE.data.units.find(x=>x.num===unit);
    if(!u) return {ok:false, reason:'Unit not found'};
    // R7 — 'held' is a live temporary lock (someone is mid-checkout); treat it
    // as unavailable so no second intake path can grab the same unit.
    if(['maintenance','occupied','held'].includes(u.status))
      return {ok:false, reason:`Unit ${unit} is ${u.status}`};
    const a1 = this.toDay(ci);
    const a2 = a1 + Math.max(1, +nights||1);
    const conflict = STATE.data.bookings.find(b=>{
      if(b.unit!==unit) return false;
      if(['cancelled','departing'].includes(b.status)) return false;
      const b1 = this.toDay(b.ci);
      const b2 = b1 + (b.nights||1);
      return this.overlap(a1,a2,b1,b2);
    });
    if(conflict) return {ok:false, reason:`Conflicts with ${conflict.id} on unit ${unit}`};
    return {ok:true};
  },
  canBookHall({space, date, guests, capacity}){
    if(capacity && guests > capacity)
      return {ok:false, reason:`Guests (${guests}) exceed package capacity (${capacity})`};
    const taken = STATE.data.events.find(e=>e.space===space && e.date===date && e.status!=='cancelled');
    if(taken) return {ok:false, reason:`${space} already booked on ${date} (${taken.id})`};
    const u = STATE.data.units.find(x=>x.label===space);
    if(u && u.status==='maintenance') return {ok:false, reason:`${space} is under maintenance`};
    return {ok:true};
  },
  canSeatTable({unit}){
    const u = STATE.data.units.find(x=>x.num===unit);
    if(!u) return {ok:false, reason:'Table not found'};
    if(u.status==='maintenance') return {ok:false, reason:`Table ${unit} is under maintenance`};
    return {ok:true};
  },
  canTransitionUnit(unit, next){
    const u = STATE.data.units.find(x=>x.num===unit);
    if(!u) return {ok:false, reason:'Unit not found'};
    if(u.status==='occupied' && next==='available')
      return {ok:false, reason:'Check-out booking first; cannot jump to available'};
    return {ok:true};
  },
};

          <button class="btn btn-accent" id="pay_submit">Pay ${fmt(due)}</button>
        </div>
      </div>`;
    openModal('Stripe checkout · '+ent.id, body);
    $('#pay_submit').addEventListener('click', async ()=>{
      const cc = ($('#pay_cc').value||'').replace(/\s+/g,'');
      if(!/^\d{13,19}$/.test(cc)) return toast('Invalid card','Check number','error');
      const btn = $('#pay_submit'); btn.disabled=true; btn.textContent='Processing…';
      // Stripe path (real) — tokenize on the client (no PaymentIntent server here, so we
      // surface the token and simulate confirmation). Builders wire their server next.
      let txnId = 'simu_'+Math.random().toString(36).slice(2,12);
      try{
        if(stripeReady){
          const stripe = Stripe(this.pk());
          const card = { number:cc, exp_month:+$('#pay_exp').value.split('/')[0], exp_year:2000+ +$('#pay_exp').value.split('/')[1], cvc:$('#pay_cvc').value };
          const res = await stripe.createToken('card', card).catch(e=>({error:e}));
          if(res && res.token){ txnId = res.token.id; }
          else if(res && res.error){ console.warn('Stripe error', res.error); }
        }
      }catch(e){ console.warn(e); }
      // simulate latency
      await new Promise(r=>setTimeout(r, stripeReady?400:900));
      ent.paid = ent.amount;
      ent.txns = (ent.txns||[]); ent.txns.push({id:txnId, amount:due, at:new Date().toISOString(), method:'Stripe'});
      MSG.autoSend('paymentReceipt', kind, ent);
      pushNotif({title:`Payment received: ${ent.id}`, sub:`${fmt(due)} · Stripe`, color:'green'});
      toast('Payment successful', `${ent.id} · ${fmt(due)}`, 'success');
      closeModal(); closeDrawer(); navigate(STATE.view);
    });
  },
};

/* ---------- 3) OFFLINE MESSAGE QUEUE ---------------------- */
const QUEUE = {
  key:'aiben.msg.queue',
  list(){ try{return JSON.parse(localStorage.getItem(this.key)||'[]')}catch(e){return [];} },
  save(arr){ try{ localStorage.setItem(this.key, JSON.stringify(arr)); }catch(e){} this.paint(); },
  add(item){ const a=this.list(); a.push({...item, qid:uid('QM'), at:new Date().toISOString()}); this.save(a); },
  remove(qid){ this.save(this.list().filter(x=>x.qid!==qid)); },
  // Force-delivers one pending item right now (used by the message centre's
  // per-item "Send now" as well as by flush()), regardless of current
  // connectivity — an explicit manual sync always wins.
  sendOne(qid){
    const it = this.list().find(x=>x.qid===qid); if(!it) return false;
    __realAutoSend(it.template, it.kind, it.entity, it.channel);
    AUDIT.record('comm','queue-flushed', it.entity.id, {template:it.template, channel:it.channel});
    this.remove(qid);
    return true;
  },
  flush(){
    if(!navigator.onLine) return 0;
    const a = this.list(); if(!a.length) return 0;
    a.forEach(it=> this.sendOne(it.qid));
    return a.length;
  },
  paint(){
    const el = document.getElementById('queuePill');
    if(!el) return;
    const n = this.list().length;
    el.style.display = (n||!navigator.onLine) ? 'inline-flex' : 'none';
    el.innerHTML = navigator.onLine
      ? `<span class="dot" style="background:#FFB820"></span> ${n} queued`
      : `<span class="dot" style="background:#FF5C5C"></span> Offline · ${n} queued`;
    el.style.background = 'rgba(255,255,255,0.04)';
    el.style.border = '.5px solid rgba(255,255,255,0.10)';
    el.style.padding = '4px 10px'; el.style.borderRadius = '999px';
    el.style.fontSize = '11.5px'; el.style.color = 'var(--text-2)';
    el.style.cursor = 'pointer'; el.style.gap = '6px'; el.style.alignItems='center';
    el.style.display = (n||!navigator.onLine) ? 'inline-flex' : 'none';
  }
};

/* Wrap MSG.render to apply template overrides + variable interpolation */
const __origRender = MSG.render.bind(MSG);
function tplOverrides(){
  try{ return JSON.parse(localStorage.getItem('aiben.tpl.'+STATE.property.code)||'{}'); }
  catch(e){ return {}; }
}
function interpolate(str, ent){
  const g = MSG.resolveGuest(ent); const p = STATE.property;
  return String(str||'')
    .replace(/\{guest\}/g, g.name||'guest')
    .replace(/\{email\}/g, g.email||'')
    .replace(/\{phone\}/g, g.phone||'')
    .replace(/\{property\}/g, p.name)
    .replace(/\{id\}/g, ent.id||'')
    .replace(/\{unit\}/g, ent.unit||'')
    .replace(/\{type\}/g, ent.type||'')
    .replace(/\{ci\}/g, ent.ci||'')
    .replace(/\{nights\}/g, ent.nights||'')
    .replace(/\{amount\}/g, fmt(ent.amount||0))
    .replace(/\{paid\}/g, fmt(ent.paid||0))
    .replace(/\{balance\}/g, fmt((ent.amount||0)-(ent.paid||0)))
    .replace(/\{date\}/g, ent.date||ent.ci||'')
    .replace(/\{space\}/g, ent.space||'')
    .replace(/\{package\}/g, ent.package||'')
    .replace(/\{status\}/g, ent.status||'');
}
MSG.render = function(tplName, entity){
  const ovr = tplOverrides()[tplName];
  if(!ovr || (!ovr.subject && !ovr.body)) return __origRender(tplName, entity);
  return {
    subject: interpolate(ovr.subject||'', entity),
    body:    interpolate(ovr.body||'',    entity),
    guest:   MSG.resolveGuest(entity),
    label:   MSG.TEMPLATES[tplName]?.label || tplName
  };
};

/* Wrap MSG.autoSend so it (a) records audit (b) queues when offline */
const __pureAutoSend = MSG.autoSend.bind(MSG);
function __realAutoSend(tplName, kind, entity, channel){
  __pureAutoSend(tplName, kind, entity, channel);
  AUDIT.record('comm','sent', entity.id, {template:tplName, channel:channel||'Email'});
}
MSG.autoSend = function(tplName, kind, entity, channel){
  channel = channel || 'Email';
  if(channel!=='In-app' && !navigator.onLine){
    QUEUE.add({template:tplName, kind, entity:JSON.parse(JSON.stringify(entity)), channel});
    pushNotif({title:'Offline · message queued', sub:`${tplName} · ${entity.id}`, color:'amber'});
    AUDIT.record('comm','queued', entity.id, {template:tplName, channel});
    if(STATE.view==='comms') navigate('comms');
    return;
  }
  __realAutoSend(tplName, kind, entity, channel);
};

PAY.refund = function(kind, id, mode){
  if(!can('payment.process')) return toast('Not allowed','Cannot issue refund','error');
  const ent = PAY.getEntity(kind, id); if(!ent) return;
  if(!ent.paid) return toast('Nothing to refund', ent.id, 'info');
  const max = ent.paid;
  const body = `
    <div class="form-grid">
      <div class="full"><div class="muted" style="font-size:12px;margin-bottom:4px">Reference</div><div class="cell-mono">${escapeHTML(ent.id)} · ${escapeHTML(kind)}</div></div>
      <div><label>Refundable</label><input value="${fmt(max)}" disabled/></div>
      <div><label>Refund amount</label><input id="rf_amt" type="number" min="1" max="${max}" value="${mode==='full'?max:Math.round(max/2)}"/></div>
      <div class="full"><label>Reason (added to audit log)</label><input id="rf_reason" placeholder="e.g. Guest cancelled · within policy"/></div>
      <div class="full"><label><input type="checkbox" id="rf_notify" checked/> &nbsp; Notify customer & re-issue receipt (email + WhatsApp)</label></div>
      <div class="full" style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        <button class="btn" onclick="window.__aiben_closeModal()">Cancel</button>
        <button class="btn btn-accent" id="rf_submit">Issue refund</button>
      </div>
    </div>`;
  openModal('Stripe refund · '+ent.id, body);
  $('#rf_submit').addEventListener('click', async ()=>{
    const amt = Math.min(max, Math.max(0, parseFloat($('#rf_amt').value)||0));
    if(amt<=0) return toast('Invalid amount','Enter a positive number','error');
    const reason = $('#rf_reason').value || 'No reason provided';
    const notify = $('#rf_notify').checked;
    const btn = $('#rf_submit'); btn.disabled=true; btn.textContent='Processing…';
    await new Promise(r=>setTimeout(r, 600));
    ent.paid = Math.max(0, ent.paid - amt);
    ent.status = (amt>=max) ? 'refunded' : ent.status;
    ent.txns = ent.txns||[]; ent.txns.push({id:'rfnd_'+uid('TX'), amount:-amt, at:new Date().toISOString(), method:'Stripe refund', reason});
    AUDIT.record('payment', amt>=max?'refund-full':'refund-partial', ent.id, {amount:amt, reason, balance:ent.paid});
    if(notify){
      MSG.autoSend('paymentReceipt', kind, ent, 'Email');
      MSG.autoSend('statusUpdate', kind, ent, 'WhatsApp');
    }
    pushNotif({title:'Refund issued: '+ent.id, sub:`${fmt(amt)} · Stripe`, color:'amber'});
    toast('Refund processed', `${ent.id} · ${fmt(amt)}`, 'success');
    closeModal(); closeDrawer(); navigate(STATE.view);
  });
};
PAY.voidTxn = function(kind, id){
  if(!can('payment.process')) return toast('Not allowed','Cannot void','error');
  const ent = PAY.getEntity(kind, id); if(!ent) return;
  if(!confirm(`Void ${ent.id}? This refunds ${fmt(ent.paid)} and marks the transaction void.`)) return;
  const was = ent.paid;
  ent.paid = 0; ent.status = 'void';
  ent.txns = ent.txns||[]; ent.txns.push({id:'void_'+uid('TX'), amount:-was, at:new Date().toISOString(), method:'Stripe void'});
  AUDIT.record('payment','void', ent.id, {amount:was});
  MSG.autoSend('paymentReceipt', kind, ent, 'Email');
  MSG.autoSend('statusUpdate', kind, ent, 'WhatsApp');
  pushNotif({title:'Voided: '+ent.id, sub:fmt(was), color:'red'});
  toast('Transaction voided', ent.id, 'success');
  closeDrawer(); navigate(STATE.view);
};
window.__aiben_refund = (k,id)=>PAY.refund(k,id);
window.__aiben_void   = (k,id)=>PAY.voidTxn(k,id);

/* Augment the existing pay/charge button block in any drawer with Refund/Void */
const __origOpenDrawer = openDrawer;
openDrawer = function(title, html){
  html = String(html).replace(
    /(<button[^>]*onclick="window\.__aiben_pay\('(\w+)','([^']+)'\)"[^>]*>[^<]*<\/button>)/g,
    function(_, btn, kind, id){
      const ent = PAY.getEntity(kind,id);
      const canRefund = ent && ent.paid>0;
      const extras = canRefund
        ? `<button class="btn" onclick="window.__aiben_refund('${kind}','${id}')">↩ Refund</button>
           <button class="btn" onclick="window.__aiben_void('${kind}','${id}')">⛔ Void</button>`
        : '';
      return btn + extras;
    });
  __origOpenDrawer(title, html);
};

/* ---------- 4) DELIVERY LEDGER (per-recipient statuses) ---- */
const DELIVERY = {
  key(){ return 'aiben.deliv.'+(STATE.property?.code||'_'); },
  list(){ try{return JSON.parse(localStorage.getItem(this.key())||'[]')}catch(e){return [];} },
  save(a){ try{ localStorage.setItem(this.key(), JSON.stringify(a)); }catch(e){} },
  add(rec){
    const r = {id:uid('DLV'), at:new Date().toISOString(), attempts:1, ...rec};
    const a = this.list(); a.unshift(r); if(a.length>500) a.length=500; this.save(a); return r;
  },
  update(id, patch){
    const a = this.list(); const r = a.find(x=>x.id===id); if(r){ Object.assign(r, patch); this.save(a); } return r;
  },
  retry(id){
    if(!navigator.onLine) return toast('Offline','Cannot retry while offline','error');
    const a = this.list(); const r = a.find(x=>x.id===id); if(!r) return;
    r.attempts = (r.attempts||1)+1; r.status='retried'; this.save(a);
    AUDIT.record('comm','retry', r.ref, {template:r.template, channel:r.channel, to:r.to, attempt:r.attempts});
    toast('Retrying…', `${r.template} · ${r.to||r.channel}`,'info');
    setTimeout(()=>{
      const ok = Math.random()<0.9;
      this.update(r.id, {status: ok?'sent':'failed'});
      AUDIT.record('comm', ok?'retry-sent':'retry-failed', r.ref, {template:r.template, channel:r.channel, to:r.to});
      toast(ok?'Delivered':'Still failing', `${r.template} · ${r.to||r.channel}`, ok?'success':'error');
      if(STATE.view==='comms'||STATE.view==='audit') navigate(STATE.view);
    }, 700);
  }
};

/* Wrap MSG.autoSend → record per-recipient delivery + honour automation toggles */
const __v3AutoSend = MSG.autoSend.bind(MSG);
MSG.dispatch = function(tplName, kind, entity, channel){
  channel = channel || 'Email';
  const g = MSG.resolveGuest(entity);
  const to = channel==='In-app' ? 'Message centre' : channel==='WhatsApp' ? (g.phone||'—') : (g.email||'—');
  // In-app receipts land straight in the message centre — no network hop, so they
  // can't queue or fail the way an outbound Email/WhatsApp send can.
  const online = channel==='In-app' ? true : navigator.onLine;
  let status = online ? 'sent' : 'queued';
  if(channel!=='In-app' && online && Math.random()<0.07) status='failed';
  const rec = DELIVERY.add({to, channel, template:tplName, ref:entity.id, kind, status, recipient:g.name||'Guest'});
  if(status==='failed') AUDIT.record('comm','failed', entity.id, {template:tplName, channel, to});
  __v3AutoSend(tplName, kind, entity, channel);
  return rec;
};
MSG.autoSend = function(tplName, kind, entity, channel){
  channel = channel || 'Email';
  if(autoSettings()[tplName]===false){
    AUDIT.record('comm','auto-skipped', entity.id, {template:tplName, channel});
    return;
  }
  return MSG.dispatch(tplName, kind, entity, channel);
};

/* ---------- 6) SCHEDULED REMINDERS ------------------------- */
const SCHED = {
  key(){ return 'aiben.sched.'+(STATE.property?.code||'_'); },
  list(){ try{return JSON.parse(localStorage.getItem(this.key())||'[]')}catch(e){return [];} },
  save(a){ try{ localStorage.setItem(this.key(), JSON.stringify(a)); }catch(e){} },
  add({template,kind,refId,channel,sendAt,label}){
    const r = {id:uid('SCH'), template, kind, refId, channel, sendAt, label, status:'pending', at:new Date().toISOString()};
    const a=this.list(); a.push(r); this.save(a);
    AUDIT.record('comm','reminder-scheduled', refId, {template, channel, sendAt});
    return r;
  },
  cancel(id){ const a=this.list().filter(x=>x.id!==id); this.save(a); },
  tick(){
    if(!STATE.data) return;
    const a=this.list(); let changed=false;
    a.forEach(r=>{
      if(r.status!=='pending') return;
      if(new Date(r.sendAt).getTime() > Date.now()) return;
      const ent = PAY.getEntity(r.kind, r.refId);
      if(!ent){ r.status='cancelled'; changed=true; return; }
      MSG.dispatch(r.template, r.kind, ent, r.channel); // scheduled — bypasses auto toggle, queues if offline
      r.status = navigator.onLine ? 'sent' : 'dispatched-offline';
      changed=true;
      pushNotif({title:'Scheduled reminder sent', sub:`${r.template} · ${r.refId}`, color:'green'});
    });
    if(changed){ this.save(a); if(STATE.view==='comms') navigate('comms'); }
  }
};

    ...D.bookings.map(b=>({k:'booking',id:b.id,l:'Booking '+b.id+' · '+b.unit})),

  const tplNames = Object.keys(MSG.TEMPLATES);
  const msgs = (D.messages||[]);
  const unreadCount = msgs.filter(m=>m.unread).length;
  const pending = QUEUE.list().sort((a,b)=> new Date(b.at)-new Date(a.at)); // offline-queued, not yet synced
  const online = navigator.onLine;

  // Unified feed: every pending (not-yet-synced) item first, newest first, then
  // every already-delivered/in-app message, newest first. Same list, same card —
  // this is the "offline and online synced together" view: nothing lives in a
  // separate silo, an item just moves from "pending sync" to "delivered" in place.
  const pendingRows = pending.map(it=>{
    const g = MSG.resolveGuest(it.entity);
    const tpl = MSG.TEMPLATES[it.template];
    const preview = tpl ? tpl.subject(it.entity, g, STATE.property) : it.template;
    return `<div class="comm-row" data-qid="${it.qid}">
      <div class="av ${colorFor(g.name)}" style="opacity:.6">${initials(g.name||'?')}</div>

          <span class="pill muted" style="margin-left:6px">${escapeHTML(it.channel)}</span>
        </div>
        <div class="cell-sub">${escapeHTML(preview)} <span class="cell-mono" style="margin-left:6px">${escapeHTML(it.entity.id||'')}${it.entity.unit?' · unit '+escapeHTML(it.entity.unit):''}</span></div>
      </div>
      <div class="comm-side">
        <div class="cell-mono" style="font-size:11px;color:var(--muted)">${new Date(it.at).toLocaleTimeString()}</div>
        <button class="btn btn-sm" data-sync-one="${it.qid}">↻ Sync now</button>
      </div>
    </div>`;
  }).join('');
  const deliveredRows = msgs.slice(0,40).map(m=>{
    const g = D.guests.find(x=>x.id===m.guest) || {name:'Guest'};
    const isAuto = !!m.automated;
    const refBadge = m.refId ? `<span class="cell-mono" style="margin-left:6px">${escapeHTML(m.refId)}${m.unit?' · unit '+escapeHTML(m.unit):''}</span>` : '';
    return `<div class="comm-row" data-msgid="${m.id}" style="cursor:pointer">
      <div class="av ${colorFor(g.name)}">${initials(g.name)}</div>
      <div class="comm-meta">
        <div class="cell-main">${escapeHTML(g.name)}
          ${m.unread?'<span class="pill amber" style="margin-left:6px">unread</span>':''}
          ${m.channel==='In-app'?'<span class="pill blue" style="margin-left:6px">In-app receipt</span>':isAuto?`<span class="pill green" style="margin-left:6px">Synced · ${escapeHTML(m.channel)}</span>`:''}
        </div>
        <div class="cell-sub">${escapeHTML(m.preview)}${refBadge}</div>
      </div>
      <div class="comm-side"><div class="cell-mono" style="font-size:11px;color:var(--muted)">${escapeHTML(m.time)}</div></div>
    </div>`;
  }).join('');

  root.innerHTML = `
    <div class="page-head">
      <div><div class="page-title">Communications</div><div class="page-sub">Unified message centre · offline queue synced with online delivery</div></div>
      <div class="page-actions">
        <span class="dstat ${online?'green':'red'}">${online?'● Online':'● Offline'}</span>
        <button class="btn" id="cFlush">Flush queue</button>
      </div>
    </div>

    <div class="kpi-grid">
      ${kpi('Delivered', counts.sent, I.check,'auto-confirmed','up','green')}
      ${kpi('Pending sync', pending.length, I.msg, online?'will sync now':'waiting for connection','down','amber')}
      ${kpi('Failed', counts.failed, I.bell,'needs retry','down','red')}
      ${kpi('In-app unread', unreadCount, I.msg,'message centre','up','blue')}
    </div>

    ${section('Message centre', I.msg, msgs.length+pending.length+' conversations', `

        <span class="muted" style="font-size:11px">

            ? (pending.length ? `${pending.length} message${pending.length>1?'s':''} queued while offline — syncing now.` : 'Everything is synced. Online bookings/orders auto-receipt here instantly; offline ones sync in once confirmed.')

        </span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" id="mcSyncNow" ${(online && pending.length)?'':'disabled'}>⇅ Sync now (${pending.length})</button>
          <button class="btn btn-sm" id="mcMarkAll" ${unreadCount?'':'disabled'}>Mark all read</button>
        </div>
      </div>
      <div class="comm-feed">
        ${(pendingRows+deliveredRows) || emptyMsg('No conversations yet — confirmations will appear here automatically')}
      </div>
    `)}
    <div style="height:14px"></div>

    <div class="ops-grid">
      <div>
        ${section('Delivery log', I.msg, deliv.length+' messages', `
          <div class="comm-filters">
            ${['all','sent','queued','failed','retried'].map(f=>`<button class="cfbtn ${flt===f?'active':''}" data-flt="${f}">${f[0].toUpperCase()+f.slice(1)} <b>${f==='all'?counts.all:counts[f]||0}</b></button>`).join('')}
          </div>
          <div class="comm-feed">
            ${fdeliv.length===0?emptyMsg('No messages for this filter'):fdeliv.slice(0,60).map(d=>`
              <div class="comm-row">
                <div class="av ${colorFor(d.recipient||d.to)}">${initials(d.recipient||d.to||'?')}</div>
                <div class="comm-meta">
                  <div class="cell-main">${escapeHTML(MSG.TEMPLATES[d.template]?.label||d.template)} ${dpill(d.status)}</div>
                  <div class="cell-sub">${escapeHTML(d.recipient||'')} · ${escapeHTML(d.to||'')} · ${escapeHTML(d.channel)} · <span class="cell-mono">${escapeHTML(d.ref||'')}</span></div>
                </div>
                <div class="comm-side">
                  <div class="cell-mono" style="font-size:11px;color:var(--muted)">${new Date(d.at).toLocaleTimeString()}</div>
                  ${(d.status==='failed')?`<button class="btn btn-sm" data-retry="${d.id}">↻ Retry</button>`:''}
                </div>
              </div>`).join('')}
          </div>
        `)}
      </div>

      <div>
        ${section('Automation rules', I.gear, isAdmin()?'editable':'view only', `
          <div class="auto-list">
            ${tplNames.map(t=>`
              <label class="auto-row">
                <span>${escapeHTML(MSG.TEMPLATES[t].label)}</span>
                <input type="checkbox" data-auto="${t}" ${auto[t]!==false?'checked':''} ${isAdmin()?'':'disabled'} style="width:auto"/>
              </label>`).join('')}
          </div>
          <div style="padding:0 16px 14px;font-size:11px;color:var(--muted)">Booking / order / event confirmations auto-route: online → in-app message centre, offline → email — and if the device itself is offline, they queue here until reconnected.</div>
        `)}
        <div style="height:14px"></div>
        ${section('Schedule a reminder', I.cal, '', `
          <div style="padding:14px 16px" class="form-grid">
            <div class="full"><label>Booking / Order / Event</label>
              <select id="sc_ent">${entities.length?entities.map(e=>`<option value="${e.k}|${e.id}">${escapeHTML(e.l)}</option>`).join(''):'<option value="">No records yet</option>'}</select></div>
            <div><label>Template</label><select id="sc_tpl">${tplNames.map(t=>`<option value="${t}">${escapeHTML(MSG.TEMPLATES[t].label)}</option>`).join('')}</select></div>
            <div><label>Channel</label><select id="sc_ch"><option>Email</option><option>WhatsApp</option><option>SMS</option><option>In-app</option></select></div>
            <div><label>Send in (minutes)</label><input id="sc_min" type="number" value="1" min="0"/></div>
            <div style="align-self:end"><button class="btn btn-accent" id="sc_go" style="width:100%">Schedule</button></div>
          </div>
        `)}
        <div style="height:14px"></div>
        ${section('Pending reminders', I.bell, sched.length+' queued', sched.length?sched.map(s=>`
          <div class="comm-row">
            <div class="comm-meta"><div class="cell-main">${escapeHTML(MSG.TEMPLATES[s.template]?.label||s.template)} <span class="dstat amber">${escapeHTML(s.channel)}</span></div>
            <div class="cell-sub"><span class="cell-mono">${escapeHTML(s.refId)}</span> · fires ${new Date(s.sendAt).toLocaleTimeString()}</div></div>
            <div class="comm-side"><button class="btn btn-sm" data-cancel="${s.id}">Cancel</button></div>
          </div>`).join(''):emptyMsg('No reminders scheduled'))}
      </div>
    </div>`;

  root.querySelectorAll('[data-msgid]').forEach(row=>row.addEventListener('click',()=>{
    const m = D.messages.find(x=>x.id===row.dataset.msgid);
    if(m && m.unread){ m.unread=false; navigate('comms'); }
  }));
  root.querySelectorAll('[data-sync-one]').forEach(b=>b.addEventListener('click',(ev)=>{
    ev.stopPropagation();
    const ok = QUEUE.sendOne(b.dataset.syncOne);
    if(ok) toast('Synced','Message delivered to the centre','success');
    navigate('comms');
  }));
  $('#mcSyncNow',root)?.addEventListener('click',()=>{
    const n = QUEUE.flush();
    toast(n?'Synced':'Nothing to sync', n?`${n} message${n>1?'s':''} synced`:'Already up to date', n?'success':'info');
    navigate('comms');
  });
  $('#mcMarkAll',root)?.addEventListener('click',()=>{
    D.messages.forEach(m=>m.unread=false);
    toast('Message centre cleared','All conversations marked read','success');
    navigate('comms');
  });
  root.querySelectorAll('[data-flt]').forEach(b=>b.addEventListener('click',()=>{ STATE._commFilter=b.dataset.flt; navigate('comms'); }));
  root.querySelectorAll('[data-retry]').forEach(b=>b.addEventListener('click',()=>DELIVERY.retry(b.dataset.retry)));
  root.querySelectorAll('[data-auto]').forEach(c=>c.addEventListener('change',()=>{
    if(!isAdmin()) return;
    setAuto(c.dataset.auto, c.checked);
    AUDIT.record('comm','automation-'+(c.checked?'on':'off'), c.dataset.auto, {});
    toast('Automation updated', MSG.TEMPLATES[c.dataset.auto].label+' · '+(c.checked?'on':'off'),'info');
  }));
  root.querySelectorAll('[data-cancel]').forEach(b=>b.addEventListener('click',()=>{ SCHED.cancel(b.dataset.cancel); toast('Reminder cancelled','','info'); navigate('comms'); }));
  $('#cFlush',root)?.addEventListener('click',()=>{ const n=QUEUE.flush(); toast(n?'Flushed':'Nothing queued', n+' messages', n?'success':'info'); navigate('comms'); });
  $('#sc_go',root)?.addEventListener('click',()=>{
    const v = $('#sc_ent').value; if(!v) return toast('No record','Create a booking first','error');
    const [k,id] = v.split('|');
    const mins = Math.max(0, +$('#sc_min').value||0);
    const sendAt = new Date(Date.now()+mins*60000).toISOString();
    SCHED.add({template:$('#sc_tpl').value, kind:k, refId:id, channel:$('#sc_ch').value, sendAt, label:$('#sc_tpl').value});
    toast('Reminder scheduled', `Fires in ${mins} min`,'success');
    navigate('comms');
  });
};

/* ---------- 9) AUDIT VIEW — add delivery status filter ----- */
const __v3AuditView = VIEWS['audit'];
VIEWS['audit'] = function(root){
  __v3AuditView(root);
  const deliv = DELIVERY.list();
  const f = STATE._auditDeliv || 'all';
  const fd = deliv.filter(d=>{ if(f==='all') return true; const k=d.status==='dispatched-offline'?'queued':d.status; return k===f; });
  const counts = {all:deliv.length, sent:0, queued:0, failed:0, retried:0};
  deliv.forEach(d=>{ const k=d.status==='dispatched-offline'?'queued':d.status; if(counts[k]!=null) counts[k]++; });
  const block = document.createElement('div');
  block.style.marginTop='14px';
  block.innerHTML = `
    <div class="section-title">Message delivery statuses (${deliv.length})</div>
    <div class="card" style="padding:12px">
      <div class="comm-filters">
        ${['all','sent','queued','failed','retried'].map(x=>`<button class="cfbtn ${f===x?'active':''}" data-df="${x}">${x[0].toUpperCase()+x.slice(1)} <b>${x==='all'?counts.all:counts[x]||0}</b></button>`).join('')}
      </div>
      <div class="comm-feed">
        ${fd.length===0?emptyMsg('No deliveries'):fd.slice(0,80).map(d=>`
          <div class="comm-row">
            <div class="comm-meta"><div class="cell-main">${escapeHTML(MSG.TEMPLATES[d.template]?.label||d.template)} ${dpill(d.status)}</div>
            <div class="cell-sub">${escapeHTML(d.recipient||'')} · ${escapeHTML(d.to||'')} · ${escapeHTML(d.channel)} · <span class="cell-mono">${escapeHTML(d.ref||'')}</span> · ${d.attempts||1} attempt(s)</div></div>
            <div class="comm-side">${d.status==='failed'?`<button class="btn btn-sm" data-retry="${d.id}">↻ Retry</button>`:''}</div>
          </div>`).join('')}
      </div>
    </div>`;
  root.appendChild(block);
  block.querySelectorAll('[data-df]').forEach(b=>b.addEventListener('click',()=>{ STATE._auditDeliv=b.dataset.df; navigate('audit'); }));
  block.querySelectorAll('[data-retry]').forEach(b=>b.addEventListener('click',()=>DELIVERY.retry(b.dataset.retry)));
};

/* ----- 1) Richer base64 photo art (SVG → data URI) ----- */

    suite:      ['#2a1838','#100620','#9B7EFF'],
    gym:        ['#142536','#070d18','#4A9EFF'],
    terrace:    ['#1a3520','#06120a','#9BFF7E'],
    wine:       ['#3a1f3f','#15081a','#FF7AB6'],
    bar:        ['#1c2a3f','#08111a','#4A9EFF'],

    bridal:     ['#3a1f3f','#15081a','#FF7AB6'],
    stage:      ['#1c2a52','#0a1228','#9B7EFF'],
    sky:        ['#0e2a3f','#070b14','#FFB820'],
    valet:      ['#202028','#0a0a10','#F0A500'],
    living:     ['#0e2240','#070d20','#4A9EFF'],
    bed:        ['#2a1838','#10081e','#9B7EFF'],
    bedroom:    ['#2a1838','#10081e','#9B7EFF'],
    kitchen:    ['#1f3320','#06120a','#22C77A'],
    workspace:  ['#2a2010','#100b06','#F0A500'],
    balcony:    ['#13313a','#06151a','#5BE9E9'],
    room:       ['#2a1f10','#0c0c14','#F0A500'],
    bath:       ['#10302a','#06140f','#22C77A'],
    view:       ['#0e2a3f','#070b14','#5BE9E9'],
    lounge:     ['#2a1838','#10081e','#9B7EFF'],
    studio:     ['#2a1f10','#0c0c14','#F0A500'],
    interior:   ['#2a1f10','#0c0c14','#F0A500'],
    default:    ['#1f1f2e','#0c0c14','#F0A500'],
  };
  const key = (scene||'default').toString().toLowerCase().split(/[\s\-]/)[0];
  const [c1,c2,acc] = P[key] || P.default;
  const grid = Array.from({length:9},(_,i)=>{
    const x=40+i*64; const h=60+((i*37)%70); const y=240-h+10;
    const o=0.10+((i*0.07)%0.35).toFixed(2);
    return `<rect x="${x}" y="${y}" width="46" height="${h}" rx="3" fill="${acc}" opacity="${o}"/>`;
  }).join('');
  const dots = Array.from({length:20},(_,i)=>{
    const x=20+((i*53)%600); const y=20+((i*97)%200); const r=(i%3)+1.2;
    return `<circle cx="${x}" cy="${y}" r="${r}" fill="${acc}" opacity="${0.15+(i%5)*0.05}"/>`;
  }).join('');
  const sub2 = (sub||'').replace(/[<>&]/g,'');
  const lab2 = (label||'').replace(/[<>&]/g,'');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">

  <radialGradient id="glow" cx=".72" cy=".22" r=".75">
    <stop offset="0" stop-color="${acc}" stop-opacity=".42"/><stop offset="1" stop-color="${acc}" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="${c2}"/><stop offset="1" stop-color="#000"/>
  </linearGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".85">
    <stop offset=".55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity=".62"/>
  </radialGradient>
</defs>
<rect width="640" height="420" fill="url(#sky)"/>
<rect width="640" height="420" fill="url(#glow)"/>
${dots}
<rect x="0" y="246" width="640" height="2" fill="${acc}" opacity=".55"/>
<rect x="0" y="248" width="640" height="172" fill="url(#floor)"/>
<g>${grid}</g>
<rect x="0" y="248" width="640" height="172" fill="${acc}" opacity=".04"/>
<rect width="640" height="420" fill="url(#vig)"/>
<rect x="0" y="350" width="640" height="70" fill="#000" opacity=".55"/>
<text x="24" y="386" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">${lab2}</text>
<text x="24" y="406" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#fff" opacity=".75">${sub2}</text>
</svg>`;
  return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
}

/* Rebuild ASSET_DEFAULTS galleries/rooms with richer art, then bust per-property cache once */
(function regenerateAssetArt(){
  const sceneFromCap = (cap)=>{
    const t = (cap||'').toLowerCase();
    const map = ['lobby','rooftop','pool','restaurant','dining','grill','spa','suite','gym','terrace','wine','bar','private','ballroom','courtyard','bridal','stage','sky','valet','living','bedroom','bed','kitchen','workspace','balcony','view','lounge','studio','interior','bath'];
    for(const k of map){ if(t.includes(k)) return k; }
    return 'default';
  };
  Object.keys(ASSET_DEFAULTS).forEach(code=>{
    const A = ASSET_DEFAULTS[code];
    A.gallery = (A.gallery||[]).map(g=>({...g, img: richScenePhoto(sceneFromCap(g.cap), g.cap.split('—')[0].trim(), g.cap)}));
    A.rooms = (A.rooms||[]).map(r=>{
      const sc = sceneFromCap(r.name);
      const labels=['Interior','Bathroom','View','Lounge'];
      r.images = labels.map(l=> richScenePhoto(l.toLowerCase(), r.name, l));
      return r;
    });
  });
  /* One-time cache bust for the new art */
  try{
    if(!localStorage.getItem('aiben.artv5')){
      Object.keys(localStorage).forEach(k=>{ if(k.indexOf('aiben.assetv4.')===0) localStorage.removeItem(k); });
      localStorage.setItem('aiben.artv5','1');
    }
  }catch(e){}
})();

/* ----- 2) Profile-view & lead metrics (persistent) ----- */
const METRICS = {
  key(){ return 'aiben.metrics.'+(STATE.property?.code||'_'); },
  defaults(){ return {mapViews:0, pinClicks:0, profileViews:0, leadsTotal:0, leadsConverted:0}; },
  load(){ try{return {...this.defaults(), ...JSON.parse(localStorage.getItem(this.key())||'{}')};}catch(e){return this.defaults();} },
  save(m){ try{ localStorage.setItem(this.key(), JSON.stringify(m)); }catch(e){} },
  bump(field,by){ const m=this.load(); m[field]=(m[field]||0)+(by||1); this.save(m); return m; },
  reviewScore(){ try{ const A=loadAsset(); if(!A.reviews?.length) return 0; return +(A.reviews.reduce((s,r)=>s+r.rating,0)/A.reviews.length).toFixed(1); }catch(e){return 0;} },
  conversionRate(){ const m=this.load(); const leads = m.leadsTotal || (STATE.data?.bookings?.length+STATE.data?.orders?.length+STATE.data?.events?.length+12) || 1; const conv = m.leadsConverted || Math.round(leads*0.34); return Math.min(100, Math.round(conv/Math.max(leads,1)*100)); },
};

/* ----- 5) Universal search override ----- */
const __v5BindSearch = bindSearch;
bindSearch = function(){
  const input = $('#globalSearch');
  const out = $('#searchResults');
  if(!input||!out) return;
  // remove existing listeners by cloning
  const fresh = input.cloneNode(true);
  input.parentNode.replaceChild(fresh, input);
  const search = ()=>{
    const q = fresh.value.trim().toLowerCase();
    if(!q){ out.classList.remove('open'); return; }
    const D = STATE.data; const A = loadAsset();
    const res = [];
    (D.guests||[]).forEach(g=>{ if((g.name+' '+g.email+' '+g.phone+' '+g.country).toLowerCase().includes(q)) res.push({t:g.name, s:g.email+' · '+g.country, k:'guest', id:g.id, tag:'customer'}); });
    (D.bookings||[]).forEach(b=>{ const g=(D.guests.find(x=>x.id===b.guest)||{}); if((b.id+' '+b.unit+' '+g.name).toLowerCase().includes(q)) res.push({t:b.id, s:'Booking · '+b.unit+' · '+(g.name||''), k:'booking', id:b.id, tag:'booking'}); });
    (D.orders||[]).forEach(o=>{ if(o.id.toLowerCase().includes(q)||o.items.some(i=>i.n.toLowerCase().includes(q))) res.push({t:o.id, s:'Order · '+o.unit, k:'order', id:o.id, tag:'order'}); });
    (D.events||[]).forEach(e=>{ if((e.name+' '+e.id+' '+e.package).toLowerCase().includes(q)) res.push({t:e.name, s:e.id+' · '+e.package, k:'event', id:e.id, tag:'event'}); });
    (D.units||[]).forEach(u=>{ if((u.num+' '+u.label+' '+u.type).toLowerCase().includes(q)) res.push({t:u.label, s:u.type+' · '+u.status, k:'unit', id:u.num, tag:'room'}); });
    (A.rooms||[]).forEach(r=>{ if((r.name+' '+r.desc).toLowerCase().includes(q)) res.push({t:r.name, s:'Room category · '+fmt(r.price)+' · '+r.status, k:'roomcat', id:r.id, tag:'category'}); });
    (A.reviews||[]).forEach(r=>{ if((r.author+' '+r.text).toLowerCase().includes(q)) res.push({t:'★'.repeat(r.rating)+' · '+r.author, s:r.text.slice(0,70), k:'review', id:r.id, tag:'review'}); });
    STAFF.list().forEach(s=>{ if((s.name+' '+s.role+' '+s.email).toLowerCase().includes(q)) res.push({t:s.name, s:s.role+' · '+s.email, k:'staff', id:s.id, tag:'staff'}); });
    LISTINGS.list().forEach(l=>{ if((l.title+' '+l.channel).toLowerCase().includes(q)) res.push({t:l.title, s:l.channel+' · '+l.status, k:'listing', id:l.id, tag:'listing'}); });
    out.innerHTML = res.slice(0,12).map(r=>`<div class="sr-row" data-k="${r.k}" data-id="${escapeHTML(String(r.id))}"><div><div class="sr-t">${escapeHTML(r.t)}</div><div class="sr-s">${escapeHTML(r.s)}</div></div><span class="pill muted">${r.tag}</span></div>`).join('') || `<div class="sr-row"><div class="sr-t muted">No results for "${escapeHTML(q)}"</div></div>`;
    out.classList.add('open');
    $$('.sr-row', out).forEach(row=>row.addEventListener('click',()=>{
      const k=row.dataset.k, id=row.dataset.id; out.classList.remove('open'); fresh.value='';
      if(k==='guest'||k==='booking'||k==='order'||k==='event'||k==='unit') return openDetail(k,id);
      if(k==='roomcat'||k==='review'){ STATE._profTab = k==='review'?'reviews':'rooms'; navigate('profile'); return; }
      if(k==='staff'){ openStaffModal(id); return; }
      if(k==='listing'){ openListingModal(id); return; }
    }));
  };
  fresh.addEventListener('input', search);
  fresh.addEventListener('focus', search);
  fresh.addEventListener('blur', ()=> setTimeout(()=>out.classList.remove('open'),200));
  document.addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey) && e.key==='k'){ e.preventDefault(); fresh.focus(); } });
};

const NOTIF_COLORS = {booking:'amber', cancellation:'red', review:'green', payment:'purple', room:'blue', profile:'cyan', system:'muted', channel:'green'};

function inferNotifType(n){
  if(n.type && NOTIF_LABELS[n.type]) return n.type;
  const t = (n.title+' '+n.sub).toLowerCase();
  if(t.includes('cancel')) return 'cancellation';
  if(t.includes('book')||t.includes('reservation')||t.includes('arriv')) return 'booking';
  if(t.includes('review')||t.includes('star')) return 'review';
  if(t.includes('pay')||t.includes('invoice')||t.includes('receipt')||t.includes('refund')) return 'payment';
  if(t.includes('room')||t.includes('clean')||t.includes('maintenance')||t.includes('check-in')||t.includes('check-out')) return 'room';
  if(t.includes('profile')||t.includes('view')||t.includes('map')||t.includes('pin')) return 'profile';
  return 'system';
}
function persistNotifs(){ try{ localStorage.setItem('aiben.notifs.'+(STATE.property?.code||'_'), JSON.stringify(STATE.notifs.slice(0,200))); }catch(e){} }
function loadPersistedNotifs(){ try{ const a=JSON.parse(localStorage.getItem('aiben.notifs.'+(STATE.property?.code||'_'))||'null'); if(Array.isArray(a)&&a.length) STATE.notifs = a; }catch(e){} }

/* Override pushNotif to type, persist and broadcast */
const __v5PushNotif = pushNotif;
pushNotif = function(n){
  const typed = {...n, type: n.type || inferNotifType(n), at: n.at || new Date().toISOString(), unread:true};
  __v5PushNotif(typed);
  persistNotifs();
  if(document.getElementById('notifPop')?.classList.contains('open')) renderNotifPanel();
};

let __notifFilter = 'all';
function renderNotifPanel(){
  const pop = $('#notifPop'); if(!pop) return;
  const filtered = STATE.notifs.filter(n=> __notifFilter==='all' || (n.type||inferNotifType(n))===__notifFilter);
  const counts = {}; NOTIF_TYPES.forEach(t=>counts[t]=0);
  STATE.notifs.forEach(n=>{ const t=n.type||inferNotifType(n); counts[t]=(counts[t]||0)+1; counts.all++; });
  pop.innerHTML = `
    <div class="notif-head" style="flex-wrap:wrap;gap:8px">
      <span>Notifications <span class="muted" style="font-size:11px">· ${STATE.notifs.filter(x=>x.unread).length} unread</span></span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" id="nfMarkAll">Mark all read</button>
        <button class="btn btn-sm" id="nfClearAll">Clear all</button>
      </div>
    </div>
    <div class="comm-filters" style="padding:8px 12px 0;flex-wrap:wrap">
      ${NOTIF_TYPES.map(t=>`<button class="cfbtn ${__notifFilter===t?'active':''}" data-nf="${t}">${NOTIF_LABELS[t]} <b>${counts[t]||0}</b></button>`).join('')}
    </div>
    <div class="notif-body">
      ${filtered.length? filtered.map((n,i)=>{
        const c = NOTIF_COLORS[n.type||inferNotifType(n)]||'muted';
        return `<div class="notif-item ${n.unread?'unread':''}" data-ni="${i}">
          <div class="notif-dot" style="background:var(--${c==='muted'?'muted-2':c})"></div>
          <div style="flex:1">
            <div class="notif-t">${escapeHTML(n.title)}</div>
            <div class="notif-s">${escapeHTML(n.sub)} · <span class="muted" style="font-size:11px">${n.at?new Date(n.at).toLocaleTimeString():''}</span></div>
          </div>
          <button class="btn btn-sm" data-nrm="${i}" title="Dismiss">✕</button>
        </div>`;
      }).join('') : emptyMsg('No '+(__notifFilter==='all'?'':NOTIF_LABELS[__notifFilter]+' ')+'notifications')}
    </div>`;
  // Wire
  pop.querySelectorAll('[data-nf]').forEach(b=>b.addEventListener('click',(ev)=>{ ev.stopPropagation(); __notifFilter=b.dataset.nf; renderNotifPanel(); }));
  pop.querySelectorAll('[data-ni]').forEach(el=>el.addEventListener('click',()=>{
    const i=+el.dataset.ni; const target = STATE.notifs.filter(n=>__notifFilter==='all'||(n.type||inferNotifType(n))===__notifFilter)[i];
    if(target){ target.unread=false; persistNotifs(); refreshNotifBadge(); renderNotifPanel(); }
  }));
  pop.querySelectorAll('[data-nrm]').forEach(b=>b.addEventListener('click',(ev)=>{
    ev.stopPropagation();
    const i=+b.dataset.nrm; const target = STATE.notifs.filter(n=>__notifFilter==='all'||(n.type||inferNotifType(n))===__notifFilter)[i];
    if(!target) return;
    STATE.notifs = STATE.notifs.filter(n=>n!==target);
    persistNotifs(); refreshNotifBadge(); renderNotifPanel();
  }));
  $('#nfMarkAll').addEventListener('click',(e)=>{ e.stopPropagation(); STATE.notifs.forEach(n=>n.unread=false); persistNotifs(); refreshNotifBadge(); renderNotifPanel(); });
  $('#nfClearAll').addEventListener('click',(e)=>{ e.stopPropagation(); if(confirm('Clear all notifications?')){ STATE.notifs=[]; persistNotifs(); refreshNotifBadge(); renderNotifPanel(); } });
}
function refreshNotifBadge(){
  const c = STATE.notifs.filter(x=>x.unread).length;
  const b = $('#notifBadge'); if(!b) return;
  b.textContent = c; b.style.display = c?'':'none';
}

function csvEscape(v){ const s=String(v??''); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Exported', filename, 'success');
}
function exportDayCSV(){
  const D=STATE.data;
  const rows = [['Type','ID','Guest/Name','Unit','Source','Amount','Paid','Status']];
  D.bookings.forEach(b=>{ const g=D.guests.find(x=>x.id===b.guest)||{}; rows.push(['booking',b.id,g.name||'',b.unit,b.source,b.amount,b.paid,b.status]); });
  D.orders.forEach(o=>{ const g=D.guests.find(x=>x.id===o.guest)||{}; rows.push(['order',o.id,g.name||'',o.unit,o.source,o.amount,o.paid,o.status]); });
  D.events.forEach(e=>{ rows.push(['event',e.id,e.name,e.space,e.source,e.amount,e.paid,e.status]); });
  downloadCSV('aiben-day-'+(STATE.property?.code||'export')+'-'+new Date().toISOString().slice(0,10)+'.csv', rows);
}

/* Override listView to add Filter + functional Export */
const __v5ListView = listView;
listView = function(kind){
  const wrap = __v5ListView(kind);
  // Replace export onclick with real CSV
  wrap.querySelectorAll('[data-act="export"]').forEach(b=>{
    b.onclick = ()=>{
      const D=STATE.data;
      if(kind==='reservations'){
        const rows=[['ID','Guest','Unit','Type','Check-in','Check-out','Nights','Amount','Paid','Status','Source']];
        D.bookings.forEach(b=>{ const g=D.guests.find(x=>x.id===b.guest)||{}; rows.push([b.id,g.name||'',b.unit,b.type,b.ci,b.co,b.nights,b.amount,b.paid,b.status,b.source]); });
        downloadCSV('reservations-'+Date.now()+'.csv', rows);
      } else if(kind==='orders'){
        const rows=[['ID','Customer','Table','Items','Amount','Paid','Status','Source']];
        D.orders.forEach(o=>{ const g=D.guests.find(x=>x.id===o.guest)||{}; rows.push([o.id,g.name||'',o.unit,o.items.map(i=>i.n).join('; '),o.amount,o.paid,o.status,o.source]); });
        downloadCSV('orders-'+Date.now()+'.csv', rows);
      } else {
        const rows=[['ID','Event','Date','Guests','Space','Package','Amount','Paid','Status','Source']];
        D.events.forEach(e=>rows.push([e.id,e.name,e.date,e.guests,e.space,e.package,e.amount,e.paid,e.status,e.source]));
        downloadCSV('events-'+Date.now()+'.csv', rows);
      }
    };
  });
  // Add Filter bar
  const head = wrap.querySelector('.page-head .page-actions');
  if(head){
    const filterBtn = document.createElement('button');
    filterBtn.className='btn'; filterBtn.textContent='⌕ Filter';
    head.insertBefore(filterBtn, head.firstChild);
    const statuses = kind==='reservations' ? ['arriving','in-house','departing','confirmed']
                   : kind==='orders' ? ['new','preparing','ready','served']
                   : ['confirmed','pending'];
    const sourceList = (STATE._listFilter && STATE._listFilter[kind]) || {status:'all', src:''};
    filterBtn.onclick = ()=>{
      openModal('Filter '+kind, `
        <div class="form-grid" style="padding:0">
          <div class="full"><label>Status</label>
            <select id="flt_st"><option value="all">All</option>${statuses.map(s=>`<option ${sourceList.status===s?'selected':''} value="${s}">${s}</option>`).join('')}</select></div>
          <div class="full"><label>Source contains</label><input id="flt_src" value="${escapeHTML(sourceList.src||'')}" placeholder="e.g. Booking.com, Walk-in"/></div>
          <div class="full" style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" id="flt_clr">Clear</button>
            <button class="btn btn-accent" id="flt_go">Apply</button>
          </div>
        </div>`);
      $('#flt_clr').onclick = ()=>{ STATE._listFilter = STATE._listFilter||{}; STATE._listFilter[kind]={status:'all',src:''}; closeModal(); applyListFilter(wrap, kind); };
      $('#flt_go').onclick = ()=>{ STATE._listFilter = STATE._listFilter||{}; STATE._listFilter[kind]={status:$('#flt_st').value, src:$('#flt_src').value.trim().toLowerCase()}; closeModal(); applyListFilter(wrap, kind); };
    };
    applyListFilter(wrap, kind);
  }
  return wrap;
};
function applyListFilter(wrap, kind){
  const f = (STATE._listFilter||{})[kind]; if(!f) return;
  wrap.querySelectorAll('.section-body .row').forEach(r=>{
    const txt = r.textContent.toLowerCase();
    const status = r.querySelector('.pill:last-child')?.textContent.trim().toLowerCase()||'';
    const okSt = f.status==='all' || status.includes(f.status);
    const okSrc = !f.src || txt.includes(f.src);
    r.style.display = (okSt&&okSrc)?'':'none';
  });
}

  if(l.status==='pending' && isAdmin()){
    $('#ls_apv').onclick = ()=>{ l.status='live'; LISTINGS.save(LISTINGS.list().map(x=>x.id===id?l:x)); pushNotif({type:'profile', title:'Listing approved', sub:l.title}); closeModal(); toast('Approved',l.title,'success'); };
    $('#ls_rej').onclick = ()=>{ l.status='rejected'; LISTINGS.save(LISTINGS.list().map(x=>x.id===id?l:x)); closeModal(); toast('Rejected',l.title,'info'); };
  }
}

/* ----- 11) Bump lead-converted when bookings/orders/events are paid in full ----- */
(function hookPay(){
  const orig = PAY.markPaid?.bind(PAY);
  if(!orig) return;
  PAY.markPaid = function(kind,id){
    const r = orig(kind,id);
    METRICS.bump('leadsConverted', 1);
    pushNotif({type:'payment', title:'Payment settled', sub:kind+' · '+id});
    return r;
  };
})();

/* Helper modal close exposed earlier in file as window.__aiben_closeModal — already wired */

/* ----- 12) Re-bind on every navigation so live regions stay alive ----- */
const __v5Navigate = navigate;
navigate = function(id){
  __v5Navigate(id);
  // Ensure search re-binds (topbar may have been re-rendered? It's static — bind once is fine.)
};

/* Make sure search & notif bindings use new versions on boot too */
setTimeout(()=>{ try{ bindSearch(); }catch(e){} }, 900);

/* End v5 enhancements */

/* ============================================================
   v6 — GUEST CHAT: front desk ⇄ online booker messaging route
   Every ONLINE booking/order/event already auto-sends a receipt
   via MSG.autoSend(...,'In-app') — R13 above. This layer takes
   that exact same signal and also drops it into a persistent,
   two-way chat thread with the guest, as if their booking app
   were on the other end. Offline/staff-entered records are
   untouched — they still just get emailed (see channelPill).
   ============================================================ */
(function(){

  const GUEST_REPLIES = {
    booking:["Thank you! What time is check-in?","Perfect, see you soon.","Can I get a late checkout?","Great, is breakfast included?","Received, thank you for confirming."],
    order:["Thanks, how long until it's ready?","Perfect, I'm at the table.","Can you add extra sauce please?","Received, thank you!"],
    event:["Thank you! Can we do a walkthrough before the date?","Received the confirmation, appreciate it.","Can we increase guest count later?","Perfect, sending the deposit now."],
  };
  const FRONTDESK_QUICK = ["On our way, thank you!","You're welcome — see you soon.","Confirmed, we've noted that.","Let us know if you need anything else."];

  // Inject real chat-app styling once (bubbles with tails, avatar presence
  // dots, typing indicator, entrance animation) without touching the
  // main stylesheet.
  if(!document.getElementById('gcChatStyles')){
    const css = `
    .gc-thread{display:flex;gap:10px;align-items:center;padding:10px 14px;cursor:pointer;border-bottom:.5px solid var(--border);transition:background .12s}
    .gc-thread:hover{background:var(--card-2)}
    .gc-thread.active{background:var(--card-3)}
    .gc-avatar-wrap{position:relative;flex-shrink:0}
    .gc-online-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--card-2);animation:gcPulse 2s infinite}
    .gc-thread-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
    .gc-thread-preview{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;margin-top:2px}
    .gc-thread-preview.typing{color:var(--accent);font-style:italic}
    .gc-thread-side{margin-left:auto;text-align:right;flex-shrink:0}
    .gc-unread-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#0a0a12;font-size:10px;font-weight:700;padding:0 5px;margin-top:4px}
    .gc-msg-row{display:flex;margin:3px 0}
    .gc-bubble{max-width:74%;padding:9px 12px;font-size:12.5px;line-height:1.48;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.15)}
    .gc-bubble.sent{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0a12;border-radius:15px 15px 4px 15px}
    .gc-bubble.received{background:var(--card-3);color:var(--text);border-radius:15px 15px 15px 4px}
    .gc-bubble.system{background:var(--card-2);border:.5px dashed var(--border-3);color:var(--text-2);border-radius:12px}
    .gc-meta{font-size:9.5px;margin-top:4px;opacity:.75}
    .gc-meta.sent{text-align:right;color:#0a0a1299}
    .gc-meta.received{color:var(--muted)}
    .gc-tag{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:4px;opacity:.9}
    @keyframes gcPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,199,122,.5)}50%{box-shadow:0 0 0 4px rgba(34,199,122,0)}}
    @keyframes gcIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .gc-in{animation:gcIn .28s ease-out}
    .gc-typing{display:inline-flex;gap:3px;padding:11px 14px;background:var(--card-3);border-radius:15px 15px 15px 4px}
    .gc-typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;animation:gcBounce 1.2s infinite}
    .gc-typing span:nth-child(2){animation-delay:.15s}
    .gc-typing span:nth-child(3){animation-delay:.3s}
    @keyframes gcBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
    .gc-inputbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:.5px solid var(--border-2);background:var(--card-2)}
    .gc-input{flex:1;border-radius:20px !important;padding:10px 16px !important;background:var(--card-3) !important}
    .gc-send{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#0a0a12;display:grid;place-items:center;flex-shrink:0;font-size:15px;cursor:pointer;transition:filter .12s}
    .gc-send:hover{filter:brightness(1.08)}
    .gc-quick{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px}
    .gc-quick button{border-radius:14px;padding:5px 11px;font-size:11px}
    .gc-header{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:.5px solid var(--border-2);background:var(--card-2)}
    .gc-header-sub{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}
    `;
    const styleEl = document.createElement('style');
    styleEl.id = 'gcChatStyles';
    styleEl.textContent = css;
    document.head.appendChild(styleEl);
  }

  const CHAT = {
    list(){ if(!STATE.data.chats) STATE.data.chats = []; return STATE.data.chats; },
    threadFor(guestId, guestName){
      const chats = this.list();
      let t = chats.find(x=>x.guestId===guestId);
      if(!t){
        t = { guestId, guestName: guestName||'Guest', messages:[], unread:0, lastTime:Date.now(), refs:[] };
        chats.unshift(t);
      }
      if(guestName) t.guestName = guestName;
      return t;
    },
    // Called from the overridden MSG.autoSend whenever a receipt goes out
    // over the 'In-app' channel — i.e. every online-sourced confirmation.
    routeReceipt(tplName, kind, entity){
      const g = MSG.resolveGuest(entity) || {};
      const guestId = g.id || ('thread-'+entity.id);
      const guestName = g.name || entity.name || 'Online guest';
      const t = this.threadFor(guestId, guestName);
      const tpl = MSG.TEMPLATES[tplName];
      const body = tpl ? tpl.body(entity, g, STATE.property) : (tpl?.label || tplName);
      t.messages.push({
        id:'cm'+Date.now()+Math.random().toString(36).slice(2,6),
        from:'system', text:body, time:nowStr(), auto:true,
        label: tpl?.label || 'Update', refKind:kind, refId:entity.id
      });
      if(!t.refs.includes(entity.id)) t.refs.unshift(entity.id);
      t.unread += 1; t.lastTime = Date.now();
      pushNotif({title:`Guest chat · ${guestName}`, sub:`Auto-receipt routed · ${entity.id}`, color:'blue'});
      if(STATE.view==='chats') navigate('chats');
      // Prove the route is two-way: the booking app's "user" sees it, types, and replies.
      if(Math.random() < 0.65){
        setTimeout(()=>{
          const th = this.list().find(x=>x.guestId===guestId); if(!th) return;
          th.typing = true;
          if(STATE.view==='chats') navigate('chats');
          setTimeout(()=> this.simulateGuestReply(guestId, kind), rand(1100,2000));
        }, rand(900,2200));
      }
    },
    simulateGuestReply(guestId, kind){
      const t = this.list().find(x=>x.guestId===guestId); if(!t) return;
      t.typing = false;
      const line = pick(GUEST_REPLIES[kind] || GUEST_REPLIES.booking);
      t.messages.push({ id:'cm'+Date.now()+Math.random().toString(36).slice(2,6), from:'guest', text:line, time:nowStr() });
      t.unread += 1; t.lastTime = Date.now();
      pushNotif({title:`New message · ${t.guestName}`, sub:line, color:'purple'});
      if(STATE.view==='chats') navigate('chats');
    },
    send(guestId, text){
      const t = this.list().find(x=>x.guestId===guestId); if(!t || !text || !text.trim()) return;
      t.messages.push({ id:'cm'+Date.now()+Math.random().toString(36).slice(2,6), from:'staff', text:text.trim(), time:nowStr() });
      t.lastTime = Date.now();
      const lastKind = (t.messages.slice().reverse().find(m=>m.refKind)||{}).refKind || 'booking';
      if(Math.random() < 0.55){
        setTimeout(()=>{
          const th = this.list().find(x=>x.guestId===guestId); if(!th) return;
          th.typing = true;
          if(STATE.view==='chats') navigate('chats');
          setTimeout(()=> this.simulateGuestReply(guestId, lastKind), rand(1000,1900));
        }, rand(500,1300));
      }
    },
    open(guestId){
      const t = this.list().find(x=>x.guestId===guestId);
      if(t) t.unread = 0;
      STATE._activeChatGuest = guestId;
      navigate('chats');
    },
    unreadTotal(){ return this.list().reduce((s,t)=>s+(t.unread||0),0); },
  };
  window.__aiben_CHAT = CHAT;

  // Hook the live receipt pipeline — this is the "routing" step. Any code
  // path that already calls MSG.autoSend(...,'In-app') for an online
  // booking/order/event now also lands a message in the guest's chat.
  const __v6AutoSend = MSG.autoSend.bind(MSG);
  MSG.autoSend = function(tplName, kind, entity, channel){
    __v6AutoSend(tplName, kind, entity, channel);
    if((channel||'Email')==='In-app'){
      CHAT.routeReceipt(tplName, kind, entity);
    }
  };

  // Nav entry — dynamic unread badge, sits beside Communications.
  const __v6NavFor = navFor;
  navFor = function(cat){
    const nav = __v6NavFor(cat);
    const unread = CHAT.unreadTotal ? CHAT.unreadTotal() : 0;
    const common = nav.find(g=> g.items.some(it=>it.id==='comms'));
    if(common && !common.items.some(it=>it.id==='chats')){
      const idx = common.items.findIndex(it=>it.id==='comms');
      common.items.splice(idx+1, 0, { id:'chats', label:'Guest Chat', icon:I.msg, badge: unread? String(unread) : 'LIVE' });
    } else if(common){
      const it = common.items.find(x=>x.id==='chats');
      if(it) it.badge = unread? String(unread) : 'LIVE';
    }
    return nav;
  };

  function renderMessages(msgs){
    return msgs.map((m,i)=>{
      const next = msgs[i+1];
      const showMeta = !(next && next.from===m.from && !m.auto && !next.auto);
      const isLast = i===msgs.length-1;
      return bubble(m, showMeta, isLast);
    }).join('');
  }
  function bubble(m, showMeta, isLast){
    const mine = m.from==='staff';
    const isSystem = m.from==='system';
    const cls = mine ? 'sent' : isSystem ? 'system' : 'received';
    const align = mine ? 'flex-end' : 'flex-start';
    const tag = isSystem
      ? `<div class="gc-tag">🧾 Receipt${m.refId?' · '+escapeHTML(m.refId):''}</div>`
      : '';
    const meta = showMeta
      ? `<div class="gc-meta ${mine?'sent':'received'}">${mine?'Front desk':isSystem?'Auto-send · system':'Guest app'} · ${escapeHTML(m.time)}</div>`
      : '';
    return `<div class="gc-msg-row ${isLast?'gc-in':''}" style="justify-content:${isSystem?'center':align}">
      <div class="gc-bubble ${cls}">${tag}${escapeHTML(m.text)}${meta}</div>
    </div>`;
  }
  function typingBubble(){
    return `<div class="gc-msg-row" style="justify-content:flex-start">
      <div class="gc-typing"><span></span><span></span><span></span></div>
    </div>`;
  }

  VIEWS.chats = function(){
    const wrap = document.createElement('div');
    const threads = CHAT.list().slice().sort((a,b)=>b.lastTime-a.lastTime);
    let activeId = STATE._activeChatGuest;
    if(!activeId || !threads.some(t=>t.guestId===activeId)) activeId = threads[0]?.guestId || null;
    const active = threads.find(t=>t.guestId===activeId) || null;
    const totalMsgs = threads.reduce((s,t)=>s+t.messages.length,0);
    const autoCount = threads.reduce((s,t)=>s+t.messages.filter(m=>m.auto).length,0);

    const threadRows = threads.map(t=>{
      const last = t.messages[t.messages.length-1];
      const previewText = last ? last.text.split('\n')[0].slice(0,42) : 'No messages yet';
      return `<div class="gc-thread ${t.guestId===activeId?'active':''}" data-guest="${escapeHTML(t.guestId)}">
        <div class="gc-avatar-wrap">
          <div class="av ${colorFor(t.guestName)}">${initials(t.guestName)}</div>
          <div class="gc-online-dot"></div>
        </div>
        <div style="min-width:0;flex:1">
          <div class="gc-thread-name">${escapeHTML(t.guestName)} <span class="pill blue" style="flex-shrink:0;transform:scale(.82);transform-origin:left center">Online</span></div>
          <div class="gc-thread-preview ${t.typing?'typing':''}">${t.typing?'typing…':escapeHTML(previewText)}</div>
        </div>
        <div class="gc-thread-side">
          <div class="cell-mono" style="font-size:10px;color:var(--muted)">${last?escapeHTML(last.time):''}</div>
          ${t.unread?`<div class="gc-unread-badge">${t.unread}</div>`:''}
        </div>
      </div>`;
    }).join('');

    wrap.innerHTML = `
      <div class="page-head">
        <div><div class="page-title">Guest Chat</div><div class="page-sub">Live two-way messaging · every online booking routes its receipts here automatically</div></div>
        <div class="page-actions">
          <button class="btn btn-accent" id="chatDemoBtn">⚡ Run online-booking demo</button>
        </div>
      </div>
      <div class="kpi-grid">
        ${kpi('Active threads', threads.length, I.msg, 'online bookers','up','blue')}
        ${kpi('Unread', CHAT.unreadTotal(), I.bell, 'needs a reply', CHAT.unreadTotal()?'up':'down', CHAT.unreadTotal()?'red':'green')}
        ${kpi('Auto-routed receipts', autoCount, I.check, 'from booking flow','up','green')}
        ${kpi('Total messages', totalMsgs, I.pulse, 'this session','up','purple')}
      </div>
      <div class="section" style="display:grid;grid-template-columns:320px 1fr">
        <div style="border-right:.5px solid var(--border-2);max-height:640px;overflow:auto">
          <div class="section-head"><div class="section-title"><div class="st-ic">${I.msg}</div>Online bookers</div><span class="section-meta">${threads.length}</span></div>
          <div class="comm-feed">
            ${threadRows || emptyMsg('No chats yet — place an online booking (or click the demo button) to see a receipt route in')}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;min-height:480px">
          ${active ? `
            <div class="gc-header">
              <div class="gc-avatar-wrap">
                <div class="av ${colorFor(active.guestName)}">${initials(active.guestName)}</div>
                <div class="gc-online-dot"></div>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13.5px">${escapeHTML(active.guestName)}</div>
                <div class="gc-header-sub"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>${active.typing?'typing…':'Active now'} · Online booking</div>
              </div>
              <span class="section-meta">${active.refs.slice(0,3).map(r=>`<span class="cell-mono">${escapeHTML(r)}</span>`).join(' · ')}</span>
            </div>
            <div id="chatScroll" style="flex:1;overflow:auto;padding:14px 18px;background:var(--bg-2)">
              ${renderMessages(active.messages) || emptyMsg('No messages yet')}
              ${active.typing ? typingBubble() : ''}
            </div>
            <div class="gc-quick">
              ${FRONTDESK_QUICK.map(q=>`<button class="btn btn-sm" data-quick="${escapeHTML(q)}">${escapeHTML(q)}</button>`).join('')}
            </div>
            <div class="gc-inputbar">
              <input id="chatInput" class="gc-input" placeholder="Message this online booker…"/>
              <div class="gc-send" id="chatSend">➤</div>
            </div>
          ` : `<div style="flex:1;display:flex;align-items:center;justify-content:center">${emptyMsg('Select a conversation, or run the demo to generate one')}</div>`}
        </div>
      </div>
    `;

    wrap.querySelectorAll('[data-guest]').forEach(row=>row.addEventListener('click', ()=> CHAT.open(row.dataset.guest)));
    const scroll = $('#chatScroll', wrap); if(scroll) scroll.scrollTop = scroll.scrollHeight;
    const doSend = ()=>{
      const input = $('#chatInput', wrap); if(!input || !active) return;
      const val = input.value; if(!val.trim()) return;
      CHAT.send(active.guestId, val);
      input.value='';
      navigate('chats');
    };
    $('#chatSend', wrap)?.addEventListener('click', doSend);
    $('#chatInput', wrap)?.addEventListener('keydown', e=>{ if(e.key==='Enter') doSend(); });
    wrap.querySelectorAll('[data-quick]').forEach(b=>b.addEventListener('click', ()=>{
      if(!active) return; CHAT.send(active.guestId, b.dataset.quick); navigate('chats');
    }));
    $('#chatDemoBtn', wrap)?.addEventListener('click', ()=>{
      toast('Demo booking placed', 'Watch the receipt route into Guest Chat in a few seconds', 'success');
      simulateOne('online');
      if(STATE.property.cat==='hotel' || STATE.property.cat==='short'){
        // hold-first flow needs a moment to "pay" before the receipt fires
      }
    });
    return wrap;
  };

  // Add a "💬 Guest chat" shortcut into booking/order/event detail drawers
  // for online-sourced records, without re-templating the whole drawer.
  const __v6OpenDetail = openDetail;
  openDetail = function(kind, id){
    __v6OpenDetail(kind, id);
    if(!['booking','order','event'].includes(kind)) return;
    const D = STATE.data;
    const ent = kind==='booking' ? D.bookings.find(x=>x.id===id) : kind==='order' ? D.orders.find(x=>x.id===id) : D.events.find(x=>x.id===id);
    if(!ent || !isOnlineSource(ent.source)) return;
    const g = MSG.resolveGuest(ent) || {};
    const guestId = g.id || ('thread-'+ent.id);
    const rows = $('#drawerBody')?.querySelectorAll('div');
    const btnRow = rows ? [...rows].find(r=> r.style && r.style.display==='flex' && r.style.flexWrap) : null;
    if(btnRow && !btnRow.querySelector('[data-chat-shortcut]')){
      const btn = document.createElement('button');
      btn.className = 'btn btn-accent'; btn.dataset.chatShortcut = '1';
      btn.textContent = '💬 Guest chat';
      btn.onclick = ()=>{ closeDrawer(); CHAT.open(guestId); };
      btnRow.prepend(btn);
    }
  };

  // Seed a couple of live-looking threads right after entering the portal,
  // built from the property's own already-online-sourced seed records —
  // so the panel isn't empty on first look.
  const __v6EnterPortal = enterPortal;
  enterPortal = function(){
    __v6EnterPortal();
    setTimeout(()=>{
      const D = STATE.data; if(!D || CHAT.list().length) return;
      const seedPool = [
        ...D.bookings.filter(b=>isOnlineSource(b.source)).slice(0,1).map(b=>({tpl:'bookingConfirmed',kind:'booking',ent:b})),
        ...D.orders.filter(o=>isOnlineSource(o.source)).slice(0,1).map(o=>({tpl:'orderConfirmed',kind:'order',ent:o})),
        ...D.events.filter(e=>isOnlineSource(e.source)).slice(0,1).map(e=>({tpl:'eventConfirmed',kind:'event',ent:e})),
      ];
      seedPool.forEach((s,i)=> setTimeout(()=> MSG.autoSend(s.tpl, s.kind, s.ent, 'In-app'), 300*i));
    }, 1200);
  };

})();

})();
